name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      # depends on kami.physics (kotoba-lang/webgpu) directly — see deps.edn / kotoba-lang/physics's
      # CHANGELOG.md for the 2026-07-09 dedup rationale.
      - run: git clone --depth 1 https://github.com/kotoba-lang/webgpu.git ../webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/org-w3-webgpu.git ../org-w3-webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/expr.git ../expr
      - run: mkdir -p ../kami-engine && git clone --depth 1 https://github.com/kotoba-lang/kami-engine-sdk-clj.git ../kami-engine/kami-engine-sdk-clj
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-
      - run: clojure -M:test
